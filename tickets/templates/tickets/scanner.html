<!DOCTYPE html>
<html>
<head>
    <title>Ticket Scanner</title>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 40px;
        }

        #reader {
            width: 400px;
            margin: auto;
        }

        #result {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h2>Event Ticket Scanner</h2>

<div id="reader"></div>

<div id="result"></div>

<script>

function onScanSuccess(decodedText) {

    const ticketId = decodedText.replace("TICKET-", "");

    fetch(`/api/verify-ticket/${ticketId}/`)
    .then(response => response.json())
    .then(data => {

        if (data.valid) {
            document.getElementById("result").innerHTML =
                "VALID TICKET<br>Buyer: " + data.buyer;

        } else {
            document.getElementById("result").innerHTML =
                ". " + data.message;
        }

    });

}

let scanner = new Html5QrcodeScanner(
    "reader",
    { fps: 10, qrbox: 250 }
);

scanner.render(onScanSuccess);

</script>

</body>
</html>
