<!DOCTYPE html>
<html>
<body style="font-family: Arial, sans-serif; background-color: #f4f4f5; margin: 0; padding: 40px 0;">
    <div style="max-width: 600px; margin: 0 auto; background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        
        <div style="background-color: #0f172a; padding: 30px; text-align: center;">
            <h1 style="color: #10b981; margin: 0; font-size: 28px; letter-spacing: 1px;">Eventify</h1>
            <p style="color: #94a3b8; margin: 10px 0 0 0; font-size: 14px;">Your ticket is confirmed!</p>
        </div>

        <div style="padding: 40px 30px;">
            <h2 style="margin-top: 0; color: #1e293b;">{{ event_title }}</h2>
            
            <div style="background-color: #f8fafc; border-left: 4px solid #10b981; padding: 15px; margin: 20px 0;">
                <p style="margin: 0 0 10px 0; color: #475569;"><strong>📅 When:</strong> {{ event_date }} at {{ event_time }}</p>
                <p style="margin: 0; color: #475569;"><strong>Where:</strong> {{ event_location }}</p>
            </div>

            <div style="text-align: center; margin-top: 30px;">
                <p style="color: #64748b; font-size: 14px; margin-bottom: 5px;">Ticket Type:</p>
                <h3 style="margin: 0; color: #1e293b; font-size: 20px;">{{ ticket_type }}</h3>
            </div>
            
            <div style="text-align: center; margin-top: 30px; padding: 20px; border: 2px dashed #cbd5e1; border-radius: 8px;">
                <p style="color: #94a3b8; margin: 0;">[ QR Code Will Go Here ]</p>
            </div>
        </div>

        <div style="background-color: #f8fafc; padding: 20px; text-align: center; border-top: 1px solid #e2e8f0;">
            <p style="color: #94a3b8; font-size: 12px; margin: 0;">Need help? Reply to this email.<br>Hosted with Eventify.</p>
        </div>
    </div>
</body>
</html>
